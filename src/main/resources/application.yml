spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/peerforge
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

application:
  security:
    jwt:
      secret-key: ${YOUR_LONG_SECRET_KEY_HERE}
      expiration: 900000
      refresh-token-expiration: 604800000